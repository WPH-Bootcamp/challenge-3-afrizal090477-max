<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Assignment 3 - Landing Page</title>
    <link href="./output.css" rel="stylesheet" />
  </head>
  
  <body>
    <!-- ========== NAVBAR ========== -->
<nav class="bg-black/90 backdrop-blur-[40px] border-b border-white/10">
      <div class="flex items-center justify-between h-[84px] max-w-[1440px] mx-auto px-[140px]">

        <!-- Logo -->
        <div class="flex-1">
          <h1 class="text-white font-bold text-lg md:text-xl tracking-wide hover:opacity-80 transition">
            Tech.
          </h1>
        </div>

        <!-- Menu -->
        <ul id="mobile-menu" class="hidden md:flex flex-col md:flex-row gap-3 text-white justify-center flex-3">
          <li><a href="#" class="px-4 py-2 rounded-full hover:bg-white/10 transition">Home</a></li>
          <li><a href="#" class="px-4 py-2 rounded-full hover:bg-white/10 transition">About</a></li>
          <li><a href="#" class="px-4 py-2 rounded-full hover:bg-white/10 transition">Services</a></li>
          <li><a href="#" class="px-4 py-2 rounded-full hover:bg-white/10 transition">Our Team</a></li>
        </ul>

        <!-- Right Button -->
        <div class="flex-1 flex justify-end items-center">
          <a href="#" class="hidden md:inline-block bg-blue-600 px-5 py-2 text-white rounded-full font-medium hover:bg-blue-900 transition">
            Contact Us
          </a>

          <!-- Hamburger -->
          <button id="menu-toggle" class="md:hidden text-white text-2xl ml-4">
            ☰
          </button>
        </div>
      </div>

      <!-- Mobile Menu (Hidden by default) -->
      <ul id="mobile-menu-mobile" class="hidden flex-col gap-4 p-6 bg-black/90 text-white md:hidden">
        <li><a href="#" class="block px-4 py-2 rounded-full hover:bg-white/10">Home</a></li>
        <li><a href="#" class="block px-4 py-2 rounded-full hover:bg-white/10">About</a></li>
        <li><a href="#" class="block px-4 py-2 rounded-full hover:bg-white/10">Services</a></li>
        <li><a href="#" class="block px-4 py-2 rounded-full hover:bg-white/10">Our Team</a></li>
        <li>
          <a href="#" class="block bg-blue-600 px-5 py-2 rounded-full text-center hover:bg-blue-900">
            Contact Us
          </a>
        </li>
      </ul>
    </nav>

    <!-- ========== HERO SECTION ========== -->

    <!-- ========== FOOTER ========== -->
     <script>
    // JavaScript code for mobile menu toggle
    const mobileMenuButton = document.querySelector('#menu-toggle');
    const mobileMenu = document.querySelector('#mobile-menu-mobile');

    mobileMenuButton.addEventListener('click', () => {
      mobileMenu.classList.toggle('hidden');
    });
  </script>
  </body>
</html>
